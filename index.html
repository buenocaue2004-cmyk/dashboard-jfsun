<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — Carrinho Abandonado JFsun</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 2rem 1rem; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .section-label { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 10px; }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 1.75rem; }
  .metric { background: #fff; border-radius: 10px; padding: 16px; border: 1px solid #e8e8e8; }
  .metric-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .metric-value { font-size: 22px; font-weight: 600; color: #111; }
  .metric-sub { font-size: 11px; color: #aaa; margin-top: 4px; }
  .msg-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.75rem; }
  .msg-card { background: #fff; border-radius: 10px; border: 1px solid #e8e8e8; padding: 14px 16px; }
  .msg-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-bottom: 12px; }
  .badge-1 { background: #dbeafe; color: #1d4ed8; }
  .badge-2 { background: #ede9fe; color: #6d28d9; }
  .badge-3 { background: #d1fae5; color: #065f46; }
  .msg-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
  .msg-row:last-of-type { border-bottom: none; }
  .msg-row-label { color: #888; }
  .msg-row-val { font-weight: 500; }
  .bar-wrap { background: #f0f0f0; border-radius: 4px; height: 4px; margin-top: 10px; }
  .bar-fill { height: 4px; border-radius: 4px; }
  .bar-blue { background: #3b82f6; }
  .bar-purple { background: #8b5cf6; }
  .bar-teal { background: #10b981; }
  .filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filter-row label { font-size: 13px; color: #666; }
  select, input[type="date"] { font-size: 13px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #111; height: 34px; }
  .btn-reload { font-size: 12px; padding: 5px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; color: #444; }
  .btn-reload:hover { background: #f5f5f5; }
  .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }
  .status-text { font-size: 13px; color: #888; }
  .error-msg { font-size: 13px; color: #b91c1c; background: #fee2e2; padding: 12px 16px; border-radius: 10px; margin-bottom: 1rem; }
  .loading-msg { font-size: 14px; color: #888; padding: 3rem 0; text-align: center; }
  @media (max-width: 560px) { .msg-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>Carrinho Abandonado — JFsun</h1>
<p class="subtitle">Métricas de recuperação via WhatsApp</p>

<div id="root"><div class="loading-msg">Carregando dados da planilha...</div></div>

<script>
const SHEET_ID = '1QBLSKeeXjalPJh0zDb5wwyKzFtqbCqhkULwGE08ikiA';
const CSV_URL = 'https://corsproxy.io/?url=' + encodeURIComponent('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv');

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur); cur = ''; }
      else { cur += ch; }
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g, '').trim());
    return obj;
  }).filter(r => r.cart_id);
}

function toDate(s) {
  if (!s) return null;
  try { return new Date(s.replace(' ', 'T')); } catch(e) { return null; }
}

function filterByPeriod(rows, period, from, to) {
  const now = new Date();
  return rows.filter(r => {
    const d = toDate(r.msg1_sent_at) || toDate(r.created_at);
    if (!d) return false;
    if (period === '7') { const c = new Date(now); c.setDate(c.getDate()-7); return d >= c; }
    if (period === '30') { const c = new Date(now); c.setMonth(c.getMonth()-1); return d >= c; }
    if (period === 'custom' && from && to) { return d >= new Date(from) && d <= new Date(to+'T23:59:59'); }
    return true;
  });
}

function calcMetrics(rows) {
  let totalEnviados = 0, totalRecuperados = 0, totalReceita = 0, totalCarrinho = 0;
  const msgs = ['msg1','msg2','msg3'].map(m => {
    const enviados = rows.filter(r => r[m+'_sent_at']).length;
    const recuperados = rows.filter(r => r.recuperado && r.convertido_apos_msg === m).length;
    const receita = rows.filter(r => r.recuperado && r.convertido_apos_msg === m)
      .reduce((s, r) => s + (parseFloat(r.valor_recuperado) || 0), 0);
    totalEnviados += enviados;
    totalRecuperados += recuperados;
    totalReceita += receita;
    return { enviados, recuperados, taxa: enviados ? ((recuperados/enviados)*100) : 0, receita };
  });
  totalCarrinho = rows.filter(r => !r.recuperado)
    .reduce((s, r) => s + (parseFloat(r.valor_carrinho) || 0), 0);
  const taxaGeral = totalEnviados ? ((totalRecuperados/totalEnviados)*100) : 0;
  return { msgs, totalEnviados, totalRecuperados, taxaGeral, totalReceita, totalCarrinho };
}

function fmt(n) { return n.toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }
function fmtPct(n) { return n.toFixed(1) + '%'; }

function render(rows, period, from, to) {
  const filtered = filterByPeriod(rows, period, from, to);
  const m = calcMetrics(filtered);
  const msgLabels = ['Mensagem 1', 'Mensagem 2', 'Mensagem 3'];
  const badgeClass = ['badge-1','badge-2','badge-3'];
  const barClass = ['bar-blue','bar-purple','bar-teal'];

  const msgCards = m.msgs.map((mg, i) => `
    <div class="msg-card">
      <span class="msg-badge ${badgeClass[i]}">${msgLabels[i]}</span>
      <div class="msg-row"><span class="msg-row-label">Enviadas</span><span class="msg-row-val">${mg.enviados}</span></div>
      <div class="msg-row"><span class="msg-row-label">Recuperados</span><span class="msg-row-val">${mg.recuperados}</span></div>
      <div class="msg-row"><span class="msg-row-label">Taxa</span><span class="msg-row-val">${fmtPct(mg.taxa)}</span></div>
      <div class="msg-row"><span class="msg-row-label">Receita</span><span class="msg-row-val">${fmt(mg.receita)}</span></div>
      <div class="bar-wrap"><div class="bar-fill ${barClass[i]}" style="width:${Math.min(mg.taxa,100)}%"></div></div>
    </div>
  `).join('');

  const periodOpts = [
    {v:'all', l:'Todo período'},
    {v:'30', l:'Últimos 30 dias'},
    {v:'7', l:'Últimos 7 dias'},
    {v:'custom', l:'Período personalizado'},
  ].map(o => `<option value="${o.v}" ${period===o.v?'selected':''}>${o.l}</option>`).join('');

  const customInputs = period === 'custom' ? `
    <input type="date" id="from-date" value="${from}" />
    <span style="font-size:13px;color:#888">até</span>
    <input type="date" id="to-date" value="${to}" />
  ` : '';

  document.getElementById('root').innerHTML = `
    <div class="status-row">
      <div class="status-dot"></div>
      <span class="status-text">${filtered.length} carrinhos no período</span>
      <button class="btn-reload" onclick="loadData()">↻ Atualizar</button>
    </div>

    <div class="filter-row">
      <label for="period-sel">Período:</label>
      <select id="period-sel">${periodOpts}</select>
      ${customInputs}
    </div>

    <p class="section-label">Visão geral</p>
    <div class="metric-grid">
      <div class="metric">
        <div class="metric-label">Receita recuperada</div>
        <div class="metric-value">${fmt(m.totalReceita)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">A recuperar (estimado)</div>
        <div class="metric-value">${fmt(m.totalCarrinho)}</div>
        <div class="metric-sub">carrinhos não recuperados</div>
      </div>
      <div class="metric">
        <div class="metric-label">Taxa de recuperação</div>
        <div class="metric-value">${fmtPct(m.taxaGeral)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Carrinhos recuperados</div>
        <div class="metric-value">${m.totalRecuperados}</div>
        <div class="metric-sub">de ${m.totalEnviados} abordados</div>
      </div>
    </div>

    <p class="section-label">Por mensagem</p>
    <div class="msg-grid">${msgCards}</div>
  `;

  document.getElementById('period-sel').addEventListener('change', e => changePeriod(e.target.value));
  if (period === 'custom') {
    document.getElementById('from-date').addEventListener('change', e => { window._from = e.target.value; render(rows, 'custom', window._from, window._to); });
    document.getElementById('to-date').addEventListener('change', e => { window._to = e.target.value; render(rows, 'custom', window._from, window._to); });
  }
}

window._rows = [];
window._period = 'all';
window._from = '';
window._to = '';

function changePeriod(v) {
  window._period = v;
  if (v === 'custom') {
    const now = new Date();
    const m = new Date(now); m.setMonth(m.getMonth()-1);
    window._from = m.toISOString().slice(0,10);
    window._to = now.toISOString().slice(0,10);
  }
  render(window._rows, window._period, window._from, window._to);
}

function loadData() {
  document.getElementById('root').innerHTML = '<div class="loading-msg">Carregando dados...</div>';
  fetch(CSV_URL)
    .then(r => { if (!r.ok) throw new Error('Erro HTTP ' + r.status); return r.text(); })
    .then(text => {
      window._rows = parseCSV(text);
      render(window._rows, window._period, window._from, window._to);
    })
    .catch(err => {
      document.getElementById('root').innerHTML = `
        <div class="error-msg">Não foi possível carregar a planilha. Verifique se ela está pública (Compartilhar → Qualquer pessoa com o link).<br><small>${err.message}</small></div>
        <button class="btn-reload" onclick="loadData()">Tentar novamente</button>
      `;
    });
}

loadData();
</script>
</body>
</html>
